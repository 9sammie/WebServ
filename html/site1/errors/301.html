<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>301 Moved Permanently</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #f5f7fa;
            color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

		body.cursor-fork { cursor: url('/assets/cursors/fork.png'), auto !important; }
		body.cursor-paw { cursor: url('/assets/cursors/paw.png'), auto !important; }

        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            max-width: 500px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            color: #2d6cdf;
        }

        h2 {
            margin-top: 0;
            font-size: 1.5rem;
            color: #444;
        }

        p {
            font-size: 1rem;
            line-height: 1.5;
            margin: 20px 0;
        }

        a {
            display: inline-block;
            margin-top: 15px;
            text-decoration: none;
            background: #2d6cdf;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            transition: background 0.2s ease;
        }

        a:hover {
            background: #1f4fa3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>301</h1>
        <h2>Moved Permanently</h2>
        <p>The resource you requested has been permanently moved to a new location.</p>
        <p>Please follow the link below.</p>
        <a href="/new-page">Go to the new page</a>
    </div>
</body>
</html>
