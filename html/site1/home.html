<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chez Gusteau - Bienvenue au Port 80</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: 'Georgia', serif;
            overflow: hidden;
        }

        .hero-section {
            position: relative;
            height: 100vh;
            width: 100%;
            background: url('/assets/accueil_ratatouille.png') no-repeat center center;
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 2;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
        }

        h1 {
            font-size: 4rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        p {
            font-size: 1.5rem;
            font-style: italic;
            margin-bottom: 40px;
        }

        .btn-menu {
            display: inline-block;
            padding: 25px 50px;
            background-color: #e67e22;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 2.2rem;
            font-weight: bold;
            transition: transform 0.3s, background-color 0.3s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            border: 3px solid white;
        }

        .btn-menu:hover {
            background-color: #d35400;
            transform: scale(1.1);
        }

        .buttons-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }


        .btn-reviews {
            display: inline-block;
            padding: 15px 40px;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1.3rem;
            font-weight: bold;
            transition: transform 0.3s, background-color 0.3s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            border: 3px solid white;
        }

        .btn-reviews:hover {
            background-color: #2980b9;
            transform: scale(1.1);
        }

		body.cursor-fork { cursor: url('/assets/cursors/fork.png'), auto !important; }
		body.cursor-paw { cursor: url('/assets/cursors/paw.png'), auto !important; }

		.settings-container {
			margin-top: 50px;
			padding: 10px;
			background: rgba(255, 255, 255, 0.1);
			border-radius: 15px;
			backdrop-filter: blur(5px);
			width: 400px;
			margin-left: auto;
			margin-right: auto;
		}

		.settings-container p {
		font-size: 1rem;
		margin-bottom: 20px;
		}

		.btn-tool {
		text-decoration: none;
		font-size: 1.2rem;
		margin: 0 10px;
		padding: 5px 10px;
		background: rgba(0,0,0,0.5);
		border-radius: 5px;
		color: white;
		transition: background 0.2s;
		}

		.btn-tool:hover {
		background: #e67e22;
		}
    </style>
</head>
<body>

    <section class="hero-section">
        <div class="overlay"></div>
        
        <div class="content">
            <h1>CHEZ GUSTEAU</h1>
            <p>"Tout le monde peut cuisiner... surtout sur le Port 80 !"</p>
            
            <br>
            
            <div class="buttons-container">
                <a href="/menu.html" class="btn-menu">ENTRER ET VOIR LE MENU</a>
                <a href="/reviews.html" class="btn-reviews">📝 LIRE LES AVIS</a>
                <a href="#" onclick="window.location.href = 'http://' + window.location.hostname + ':8081/'; return false;" class="btn-reviews">🏠 VISITER SITE 2</a>
                <a href="/error_tests.html" class="btn-reviews">⚠️ TESTS D'ERREURS</a>
            </div>
			<div class="settings-container">
				<p>Personnalisez votre couvert :</p>
				<a href="/set-cursor?type=fork" class="btn-tool">Fourchette</a>
				<a href="/set-cursor?type=paw" class="btn-tool">Patte</a>
				<a href="/set-cursor?type=default" class="btn-tool">Reset</a>
            </div>
        </div>
    </section>

</body>
</html>
