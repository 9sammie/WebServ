<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chez Gusteau - Bienvenue au Port 80</title>
    <style>
        /* On occupe tout l'écran */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: 'Georgia', serif;
            overflow: hidden; /* Évite le scroll si l'image prend tout l'écran */
        }

        /* Conteneur de l'image de fond */
        .hero-section {
            position: relative;
            height: 100vh;
            width: 100%;
            background: url('/assets/accueil_ratatouille.png') no-repeat center center;
            background-size: cover; /* L'image remplit tout l'espace */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        /* Overlay pour assombrir légèrement l'image et faire ressortir le texte */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3); /* Noir à 30% d'opacité */
            z-index: 1;
        }

        /* Contenu textuel au-dessus de l'overlay */
        .content {
            position: relative;
            z-index: 2;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
        }

        h1 {
            font-size: 4rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        p {
            font-size: 1.5rem;
            font-style: italic;
            margin-bottom: 40px;
        }

        /* Ton lien Menu en "PLUS GROS" */
        .btn-menu {
            display: inline-block;
            padding: 25px 50px;
            background-color: #e67e22; /* Orange Ratatouille */
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 2.2rem; /* Très gros */
            font-weight: bold;
            transition: transform 0.3s, background-color 0.3s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            border: 3px solid white;
        }

        .btn-menu:hover {
            background-color: #d35400;
            transform: scale(1.1); /* Petit effet de zoom au survol */
        }
    </style>
</head>
<body>

    <section class="hero-section">
        <div class="overlay"></div>
        
        <div class="content">
            <h1>CHEZ GUSTEAU</h1>
            <p>"Tout le monde peut cuisiner... surtout sur le Port 80 !"</p>
            
            <br>
            
            <a href="/menu.html" class="btn-menu">ENTRER ET VOIR LE MENU</a>
        </div>
    </section>

</body>
</html>
