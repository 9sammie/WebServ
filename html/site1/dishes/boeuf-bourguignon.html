<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bœuf Bourguignon - Chez Gusteau</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #1a0f0d;
            font-family: 'Georgia', serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; color: #3e2723;
        }

        .dish-wrapper {
            width: 95vw; height: 90vh;
            background-image: url('/assets/beef_bourguignon.png');
            background-repeat: no-repeat; background-position: center;
            background-size: contain; position: relative;
            display: flex; flex-direction: column; justify-content: flex-end;
            align-items: center; padding-bottom: 5vh;
            filter: drop-shadow(0 15px 35px rgba(0,0,0,0.8));
        }

        .dish-overlay {
            background-color: rgba(255, 253, 240, 0.8);
            padding: 30px; border-radius: 15px;
            text-align: center; max-width: 60%; margin-bottom: 20px;
        }

        h1 { font-size: 3rem; margin: 0 0 10px 0; font-variant: small-caps; color: #8d1c06; }
        h2 { font-size: 1.4rem; font-style: italic; margin: 0; color: #5d4037; }
        p { font-size: 1.2rem; line-height: 1.6; margin: 20px 0; }

        .navigation { position: absolute; bottom: 40px; width: 100%; text-align: center; }
        .back-btn {
            text-decoration: none; color: #fdf5e6; background-color: #5d4037;
            padding: 12px 30px; border-radius: 30px; font-weight: bold;
            transition: all 0.3s ease; border: 2px solid white;
        }
        .back-btn:hover { background-color: #8d1c06; }
    </style>
</head>
<body>
    <div class="dish-wrapper">
        <div class="dish-overlay">
            <h1>Le Bœuf Bourguignon</h1>
            <h2>"Une caresse pour l'âme dans chaque bouchée."</h2>
            <p>De tendres morceaux de bœuf mijotés lentement dans un vin de Bourgogne corsé, accompagnés d'oignons grelots glacés et de carottes fondantes sculptées à la main.</p>
        </div>
        <div class="navigation"><a href="/menu.html" class="back-btn">← Retour au Menu</a></div>
    </div>
</body>
</html>
