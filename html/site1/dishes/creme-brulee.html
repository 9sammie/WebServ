<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crème Brûlée - Chez Gusteau</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #0f172a; /* Bleu crépuscule pour le dessert */
            font-family: 'Georgia', serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; color: #2c1e11;
        }

		body.cursor-fork { cursor: url('/assets/cursors/fork.png'), auto !important; }
		body.cursor-paw { cursor: url('/assets/cursors/paw.png'), auto !important; }

        .dish-wrapper {
            width: 95vw; height: 90vh;
            background-image: url('/assets/creme_brulee.png');
            background-repeat: no-repeat; background-position: center;
            background-size: contain; position: relative;
            display: flex; flex-direction: column; justify-content: flex-end;
            align-items: center; padding-bottom: 5vh;
            filter: drop-shadow(0 15px 45px rgba(0,0,0,0.9));
        }

        .dish-overlay {
            background-color: rgba(255, 253, 230, 0.9);
            padding: 30px; border-radius: 15px;
            text-align: center; max-width: 60%; margin-bottom: 20px;
            border: 1px solid #d4af37;
        }

        h1 { font-size: 3rem; margin: 0 0 10px 0; font-variant: small-caps; color: #b8860b; }
        h2 { font-size: 1.4rem; font-style: italic; margin: 0; color: #5d4037; }
        p { font-size: 1.2rem; line-height: 1.6; margin: 20px 0; }

        .navigation { position: absolute; bottom: 40px; width: 100%; text-align: center; }
        .back-btn {
            text-decoration: none; color: #2c1e11; background-color: #d4af37;
            padding: 12px 30px; border-radius: 30px; font-weight: bold;
            transition: all 0.3s ease; border: 2px solid #2c1e11;
        }
        .back-btn:hover { background-color: #f1c40f; color: #000; }
    </style>
</head>
<body>
    <div class="dish-wrapper">
        <div class="dish-overlay">
            <h1>Crème Brûlée Classique</h1>
            <h2>"Brisez la glace, découvrez la douceur."</h2>
            <p>Une crème onctueuse à la vanille bourbon sous une fine couche de sucre caramélisée au fer, servie avec une framboise fraîche pour une note acidulée.</p>
        </div>
        <div class="navigation"><a href="/menu.html" class="back-btn">← Retour au Menu</a></div>
    </div>
</body>
</html>
