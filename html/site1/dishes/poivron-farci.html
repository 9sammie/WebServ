<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poivron Farci - Chez Gusteau</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #3d2b1f; 
            font-family: 'Georgia', serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; color: #4e342e;
        }

		body.cursor-fork { cursor: url('/assets/cursors/fork.png'), auto !important; }
		body.cursor-paw { cursor: url('/assets/cursors/paw.png'), auto !important; }

        .dish-wrapper {
            width: 95vw; height: 90vh;
            background-image: url('/assets/stuffed_pepper.png');
            background-repeat: no-repeat; background-position: center;
            background-size: contain; position: relative;
            display: flex; flex-direction: column; justify-content: flex-end;
            align-items: center; padding-bottom: 5vh;
            filter: drop-shadow(0 15px 35px rgba(0,0,0,0.8));
        }

        .dish-overlay {
            background-color: rgba(255, 255, 255, 0.85);
            padding: 30px; border-radius: 15px;
            text-align: center; max-width: 60%; margin-bottom: 20px;
        }

        h1 { font-size: 3rem; margin: 0 0 10px 0; font-variant: small-caps; color: #d35400; }
        h2 { font-size: 1.4rem; font-style: italic; margin: 0; color: #2e7d32; }
        p { font-size: 1.2rem; line-height: 1.6; margin: 20px 0; }

        .navigation { position: absolute; bottom: 40px; width: 100%; text-align: center; }
        .back-btn {
            text-decoration: none; color: #fdf5e6; background-color: #e67e22;
            padding: 12px 30px; border-radius: 30px; font-weight: bold;
            transition: all 0.3s ease; border: 2px solid white;
        }
        .back-btn:hover { background-color: #2e7d32; }
    </style>
</head>
<body>
    <div class="dish-wrapper">
        <div class="dish-overlay">
            <h1>Le Poivron d'Été</h1>
            <h2>"La fraîcheur du jardin, rôtie avec passion."</h2>
            <p>Un poivron rouge éclatant, farci d'un mélange savoureux de quinoa, maïs croquant et haricots noirs, le tout couronné d'un fromage fondant et doré.</p>
        </div>
        <div class="navigation"><a href="/menu.html" class="back-btn">← Retour au Menu</a></div>
    </div>
</body>
</html>
