<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accidental Soup Special - Chez Gusteau</title>
    <style>
        /* Base styles consistent with the theme */
        body {
            margin: 0;
            padding: 0;
            background-color: #2b1d1a; /* Dark wood-like background */
            font-family: 'Georgia', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #5d4037;
        }

		body.cursor-fork { cursor: url('/assets/cursors/fork.png'), auto !important; }
		body.cursor-paw { cursor: url('/assets/cursors/paw.png'), auto !important; }

        /* Large, flexible hero container for the dish */
        .dish-wrapper {
            width: 95vw;
            height: 90vh;
            
            /* Background configuration: Image is now background */
            background-image: url('/assets/soup_dish.png');
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain; /* Dish is always fully visible */
            
            /* Text elements positioning */
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* Text sits at the bottom */
            align-items: center;
            padding-bottom: 5vh;
            
            filter: drop-shadow(0 15px 35px rgba(0,0,0,0.8));
        }

        /* Stylish overlay for the description text */
        .dish-overlay {
            background-color: rgba(255, 253, 240, 0.7); /* Translucent cream */
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            max-width: 60%;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 3.5rem;
            margin: 0 0 10px 0;
            font-variant: small-caps;
            color: #e67e22; /* Ratatouille Orange */
            text-shadow: 1px 1px 1px white;
        }

        h2 {
            font-size: 1.5rem;
            font-style: italic;
            margin: 0;
            color: #5d4037;
        }

        p {
            font-size: 1.2rem;
            line-height: 1.6;
            margin: 20px 0;
        }

        /* Back to Menu button styling */
        .navigation {
            position: absolute;
            bottom: 40px;
            width: 100%;
            text-align: center;
            z-index: 10;
        }

        .back-btn {
            text-decoration: none;
            color: #fdf5e6;
            background-color: #8d6e63;
            padding: 15px 35px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1.3rem;
            transition: all 0.3s ease;
            border: 2px solid white;
        }

        .back-btn:hover {
            background-color: #e67e22;
        }

        /* Responsive fixes for mobile */
        @media (max-width: 768px) {
            .dish-overlay { max-width: 90%; }
            h1 { font-size: 2.2rem; }
            .dish-wrapper { background-size: cover; height: 100vh; justify-content: center;}
        }
    </style>
</head>
<body>

    <div class="dish-wrapper">
        
        <div class="dish-overlay">
            <h1>Linguini's Soup</h1>
            <h2>"Just a touch of leeks... and perhaps some chives?"</h2>
            <p>A masterpiece born from an accident, perfected by a unique partnership. A rich, steaming vegetable blend with potato and leek, garnished with a swirl of fresh cream and chives. Comfort in a bowl.</p>
        </div>

        <div class="navigation">
            <a href="/menu.html" class="back-btn">← Back to Menu</a>
        </div>
    </div>

</body>
</html>
